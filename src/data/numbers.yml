items:
    # Projects: value computed automatically from projects.yml (items length)
    - suffix: +
      label: EU-funded projects in the ecosystem
      detail: Origin + associated projects across Europe
      tone: eu-blue
      icon: star
    # Researchers & developers: value computed automatically — sum of users across communities.yml
    - suffix: +
      label: Registered researchers & developers
      detail: Active members of the community
      tone: secondary
      icon: users
    # Gateways: value computed automatically from gateways.yml (items length)
    - suffix: +
      label: Active gateways across Europe
      detail: Domain-specific science deployments
      tone: primary
      icon: server
    # AI models: MANUAL — update this value when the catalogue count changes
    - value: "200"
      suffix: +
      label: AI models in the catalogue
      detail: Ready to train, fine-tune and deploy
      tone: neutral
      icon: box
