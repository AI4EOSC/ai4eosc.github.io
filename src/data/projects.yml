    - id: intertwin
      type: associated
      status: finished
      title: interTwin
      tagline: Co-designing and prototyping an interdisciplinary Digital Twin Engine
      description: interTwin develops a blueprint for a cross-domain digital twin engine, leveraging AI4EOSC as its AI model deployment layer. It aims to extend the technical capabilities of the European Open Science Cloud with modelling and simulation tools and to simplify DT application development.
      outputs:
          - Digital twin engine
          - Model and simulation tools
          - Data fusion
          - EOSC integration
