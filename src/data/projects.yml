      cordisUrl: https://cordis.europa.eu/project/id/101058593

    - id: fluid-ai
      type: extension
      status: new
      title: FLUID-AI
      tagline: FAIR Liquidity Unifying Interoperable Data and AI
      shortDescription: FAIR Liquidity Unifying Interoperable Data and AI.
      description: FLUID-AI aims to transform the EOSC into a dynamic, AI-ready ecosystem. The overarching goal is to significantly enhance the interoperability, machine-actionability, and AI readiness of data and models across European RIs and EOSC.
      outputs:
          - Model and data interoperability
          - Data liquidity
          - AI-ready data and models
          - Federated infrastructure
          - Easy to use platform
          - ML/AI model deployment
