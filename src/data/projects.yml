items:
    - id: ai4eosc
      type: origin
      status: finished
      title: AI4EOSC
      tagline: The Horizon Europe project that started the initiative. Artificial Intelligence for the EOSC
      shortDescription: The Horizon Europe project that created the AI4EOSC platform.
      description: The original Horizon Europe project that created the AI4EOSC platform. Developed the core infrastructure for training, serving and cataloguing AI models within the EOSC, establishing the foundation that all subsequent projects build upon.
      logo: /logos/AI4-horizontal-dark.svg
      outputsLabel: Key outputs
      outputs:
          - AI4EOSC Platform
          - DEEPaaS API
          - Model catalogue
          - OSCAR integration
          - Federated learning
      funding: 5000000
      grant: "No. 101058593"
      programme: Horizon Europe
      period: "2022 – 2024"
      lead: CSIC
      partners:
          - KIT
          - IISAS
          - INFN
