items:
    - category: Core platform
      title: AI4EOSC Platform
      tagline: Open-source infrastructure for training, serving and cataloguing AI models on EOSC
      status: Available
      description: The base infrastructure for deploying and managing AI models in EOSC.
      detailDescription: The base infrastructure for developing, training, serving and cataloguing AI models within the European Open Science Cloud. Built on open standards with native EOSC authentication and storage — no infrastructure setup required for researchers. Supports federated learning across multiple EOSC sites. Developed in the original AI4EOSC project, and continuously improved with new features and capabilities.
      iconId: platform
      theme: eu-blue
      features:
          - Model training
          - Model serving
          - Federated learning
          - DEEPaaS API
          - OSCAR integration
          - EOSC AAI
          - oneData storage
          - MLflow tracking
      linkLabel: Explore platform ↗
      linkHref: /products#platform
      visitLabel: Visit project ↗
      visitHref: https://ai4eosc.eu
      docsHref: https://docs.ai4eosc.eu
    - category: Language models
      title: AI4EOSC LLM
      tagline: Large language model services for research, integrated with EOSC infrastructure
      status: Preview
      description: Large language model services tailored for research use cases on EOSC infrastructure.
      detailDescription: Large language model services tailored for research use cases, with data sovereignty guarantees. API access to open-source LLMs optimised for scientific domains — no data leaves European infrastructure. Integrated with EOSC authentication and storage. Supports federated learning across multiple EOSC sites. Currently in preview, with a public API available for testing and feedback.
      iconId: llm
      theme: secondary
      features:
          - LLM API
          - Research-optimised
          - Data sovereignty
          - European infra
          - EOSC-native
          - OpenAI-compatible API
