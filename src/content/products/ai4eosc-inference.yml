tagline: Deploy your trained AI modules on a managed serverless platform for scalable inference.
description: OSCAR is an open-source platform to support the event-driven serverless computing model for data-processing applications. These applications are executed on customized runtime environments provided by Docker containers that run on elastic Kubernetes clusters on a multi-cloud environment, supporting edge-to-cloud scenarios. It includes features focused on improving the user experience, such as multiple interfaces, Jupyter notebook integration, visual pipeline composition, AI model serving, federated identity, multi-tenancy, storage governance, quotas and metrics.
