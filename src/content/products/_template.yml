# ── TEMPLATE: copy and rename to <product-id>.yml ────────────────────────────
#
# Required fields
category: "Category label"
title: "Product Name"
status: Available # Available | Preview | Coming soon
tagline: "Short description shown in cards"
description: "Full description shown in detail panel."
slug: product-id # URL anchor (/products#<slug>) — must be unique across products
iconId: platform # platform | llm | agents | inference (see productIcons in products.astro)
theme: eu-blue # eu-blue | secondary | primary
features:
    - "Feature 1"
    - "Feature 2"
visitLabel: "Visit project"
visitHref: https://example.ai4eosc.eu

# Optional
docsHref: https://docs.ai4eosc.eu/...
previewUrl: app.example.ai4eosc.eu # shown in the preview chrome; defaults to visitHref host
