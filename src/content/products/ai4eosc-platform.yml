detailDescription: The base infrastructure for developing, training, serving and cataloguing AI models within the European Open Science Cloud. Built on open standards with native EOSC authentication and storage — no infrastructure setup required for researchers. Supports federated learning across multiple EOSC sites. Developed in the original AI4EOSC project, and continuously improved with new features and capabilities.
