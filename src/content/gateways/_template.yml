communitySlug: community-slug # links to /ecosystem/communities#<slug>
operatedBy:
    - "INSTITUTION1"
accessType: "Open to researchers"
accessDesc: "How to get access."
tools:
    - "Tool 1"
    - "Tool 2"
logo: filename.png # image file in src/assets/logos/
url: https://gateway.example.eu
