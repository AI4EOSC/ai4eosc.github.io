name: Import RSS Feeds

on:
  # Run daily at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  import-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run RSS feed importer
        run: node scripts/import-rss-feeds.mjs

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain src/content/stories) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Open pull request with new stories
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: import new RSS feed stories"
          branch: automated/import-rss-feeds
          title: "chore: import new RSS feed stories"
          body: |
            This pull request was automatically generated by the RSS feed importer.

            It contains new stories fetched from AI4EOSC RSS feeds. Please review before merging.
          labels: automated
          add-paths: src/content/stories/*.md
